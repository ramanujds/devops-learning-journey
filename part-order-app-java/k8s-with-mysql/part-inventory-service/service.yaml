apiVersion: v1
kind: Service
metadata:
  name: part-inventory-service
  namespace: part-order-app-mysql
  labels:
    app: part-inventory-service
spec:
  # internal only - part-order-service is the only consumer
  type: ClusterIP
  selector:
    app: part-inventory-service
  ports:
    - name: http
      port: 8080
      targetPort: http
