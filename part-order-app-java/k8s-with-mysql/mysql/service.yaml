apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: part-order-app-mysql
  labels:
    app: mysql
spec:
  # headless: gives the StatefulSet pod a stable DNS name, no load-balancing
  # needed since there's a single MySQL instance
  clusterIP: None
  selector:
    app: mysql
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
